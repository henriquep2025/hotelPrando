<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel</title>
</head>
<body>
    <div id="cards"></div>
    <form action="" id="hotelForm">
    <h1>Hotéis</h1>
    <link rel="stylesheet" href="style.css">
    <div class="nome">
        <label for="nomeID">Nome:</label>
        <input type="text" id="nome" name="nome"> 
    </div>
    <div class="cidade">
        <label for="cidadeID">Cidade:</label>
        <input type="text" id="cidade" name="cidade">
    </div>
    <div class="qtdEstrelas">
        <label for="qtdEstrelasID">Quantidade de Estrelas:</label>
        <input type="number" id="qtdEstrelas" name="qtdEstrelas">
    </div>
    <button type="submit">Adicionar Hotel</button>
    </form>
    <script src="Hotel.js"></script>
</body>
</html>
