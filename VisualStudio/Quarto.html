<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartos</title>
</head>
<body>
    <div id="cards"></div>
    <form action="" id="quartoForm">
    <h1>Quartos</h1>
    <link rel="stylesheet" href="style.css">
    <div class="tipo">
        <label for="tipoID">Tipo:</label>
        <input type="text" id="tipo" name="tipo">
    </div>
    <div class="preco">
        <label for="precoID">Preço:</label>
        <input type="number" id="preco" name="qtdEstrelas">
    </div>
    <label>Hotel:</label>
    <select name="hotel" id="hotel" required></select>
    <button type="submit">Adicionar Quarto</button>
    </form>
    <script src="Quarto.js"></script>
</body>
</html>
